<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header">
        <div class="container header-inner">
          <div>
            <p class="eyebrow">Todo App</p>
            <h1>Keep your tasks simple and organized.</h1>
          </div>
          <div class="task-count" id="task-count">0 tasks</div>
        </div>
      </header>

      <main class="container main-content">
        <section class="todo-panel">
          <form id="task-form" class="task-form">
            <input id="task-input" type="text" placeholder="Add a new task..." autocomplete="off" />
            <button type="submit">Add Task</button>
          </form>

          <div class="filter-bar">
            <button class="filter-button active" data-filter="all">All</button>
            <button class="filter-button" data-filter="active">Active</button>
            <button class="filter-button" data-filter="completed">Completed</button>
          </div>

          <ul class="todo-list" id="todo-list"></ul>

          <div class="empty-state" id="empty-state">No tasks yet. Add your first todo.</div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
